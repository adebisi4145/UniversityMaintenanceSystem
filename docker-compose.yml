services:
  db:
    image: postgres:16
    container_name: ums-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: university_maintenance
    ports:
      - "5432:5432"
    volumes:
      - ums_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ums_pgdata:
